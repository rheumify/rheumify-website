<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2d2d5e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="16"/>
  <text x="450" y="44" text-anchor="middle" fill="#e2e8f0" font-size="26" font-weight="700">The TV — IL-17 Inhibitors</text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="16" font-style="italic">IL-17 drives skin and spine inflammation — Channel 17 is R-rated</text>
  <rect x="200" y="85" width="500" height="300" rx="10" fill="#1f2937" stroke="#4b5563" stroke-width="4"/>
  <rect x="220" y="100" width="460" height="265" rx="6" fill="url(#screen)" stroke="#334155" stroke-width="1"/>
  <rect x="380" y="385" width="140" height="12" rx="3" fill="#374151"/>
  <rect x="350" y="394" width="200" height="8" rx="4" fill="#4b5563"/>
  <rect x="235" y="110" width="90" height="30" rx="5" fill="#dc2626" opacity="0.9"/>
  <text x="280" y="131" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">CH 17</text>
  <rect x="590" y="110" width="75" height="30" rx="5" fill="#000" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <text x="627" y="130" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">RATED R</text>
  <text x="450" y="185" text-anchor="middle" fill="#f87171" font-size="42" font-weight="900" opacity="0.15">17</text>
  <text x="450" y="205" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Must be SEVENTEEN to watch</text>
  <rect x="245" y="225" width="130" height="55" rx="6" fill="#7c3aed" opacity="0.85"/>
  <text x="310" y="247" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">SECUKINUMAB</text>
  <text x="310" y="264" text-anchor="middle" fill="#ddd6fe" font-size="10">IL-17A</text>
  <rect x="385" y="225" width="130" height="55" rx="6" fill="#7c3aed" opacity="0.85"/>
  <text x="450" y="247" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">IXEKIZUMAB</text>
  <text x="450" y="264" text-anchor="middle" fill="#ddd6fe" font-size="10">IL-17A</text>
  <rect x="525" y="225" width="140" height="55" rx="6" fill="#2563eb" opacity="0.85"/>
  <text x="595" y="247" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">BIMEKIZUMAB</text>
  <text x="595" y="264" text-anchor="middle" fill="#bfdbfe" font-size="10">IL-17A + IL-17F</text>
  <g transform="translate(450, 325) rotate(-12)">
    <rect x="-100" y="-18" width="200" height="36" rx="4" fill="none" stroke="#dc2626" stroke-width="3" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" fill="#dc2626" font-size="18" font-weight="900" opacity="0.8">CROHN'S CANCELLED</text>
  </g>
  <rect x="55" y="210" width="110" height="130" rx="10" fill="#1e3a5f" stroke="#1e40af" stroke-width="2"/>
  <circle cx="110" cy="185" r="30" fill="#d4a574"/>
  <path d="M78,175 Q110,150 142,175 L140,180 Q110,165 80,180 Z" fill="#1e3a5f" stroke="#1e40af" stroke-width="1.5"/>
  <rect x="88" y="172" width="44" height="8" rx="2" fill="#1e40af"/>
  <circle cx="98" cy="182" r="3" fill="#1e293b"/>
  <circle cx="122" cy="182" r="3" fill="#1e293b"/>
  <line x1="98" y1="200" x2="122" y2="200" stroke="#8b6040" stroke-width="2" stroke-linecap="round"/>
  <polygon points="110,230 100,245 110,255 120,245" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="110" y="246" text-anchor="middle" fill="#78350f" font-size="7" font-weight="800">SEC</text>
  <text x="110" y="275" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">SECURITY</text>
  <path d="M55,240 Q30,230 25,210" fill="none" stroke="#1e3a5f" stroke-width="14" stroke-linecap="round"/>
  <circle cx="22" cy="205" r="10" fill="#d4a574" stroke="#b8885a" stroke-width="1"/>
  <rect x="75" y="335" width="25" height="55" rx="5" fill="#1e3a5f"/>
  <rect x="115" y="335" width="25" height="55" rx="5" fill="#1e3a5f"/>
  <rect x="70" y="383" width="35" height="12" rx="5" fill="#111"/>
  <rect x="110" y="383" width="35" height="12" rx="5" fill="#111"/>
  <text x="110" y="415" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700">SECU-rity guard</text>
  <text x="110" y="434" text-anchor="middle" fill="#93c5fd" font-size="13">Checks IDs at 17</text>
  <rect x="720" y="230" width="155" height="70" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="2"/>
  <text x="797" y="253" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="800">BIME = BOTH</text>
  <text x="797" y="274" text-anchor="middle" fill="#93c5fd" font-size="14">IL-17A + IL-17F</text>
  <text x="797" y="294" text-anchor="middle" fill="#bfdbfe" font-size="13" font-style="italic">"Two subtypes, one drug"</text>
  <line x1="720" y1="265" x2="670" y2="252" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="40" y="450" width="820" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="472" text-anchor="middle" fill="#e2e8f0" font-size="16" font-style="italic">"SECU-rity checks IDs at SEVENTEEN — but Crohn's gets cancelled from the screen."</text>
  <text x="450" y="496" text-anchor="middle" fill="#c4b5fd" font-size="16" font-style="italic">"BIME means BOTH — A and F, get out. Two subtypes, one drug, total knockout."</text>
</svg>
